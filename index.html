<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#020617,#000814);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:700;
  background:#000;
  letter-spacing:1px;
}

/* SEARCH BAR */
.search-box{
  display:flex;
  gap:8px;
  padding:12px;
}

.search-box input{
  flex:1;
  padding:14px;
  border-radius:25px;
  border:none;
  font-size:14px;
}

.search-box select{
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box button{
  padding:12px 18px;
  border-radius:25px;
  border:none;
  background:#4fd1ff;
  font-weight:600;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.categories button{
  padding:10px 16px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
  transition:0.3s;
}

.categories .active{
  background:#4fd1ff;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:14px;
}

/* CARD */
.card{
  height:120px;
  border-radius:20px;
  background:linear-gradient(145deg,#1e293b,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  animation:fadeUp 0.4s ease;
  overflow:hidden;
}

/* animation */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1;}
}

/* TAP EFFECT */
.card:active{
  transform:scale(0.96);
}

/* RIPPLE */
.card::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.1);
  opacity:0;
  transition:0.3s;
}

.card:active::after{
  opacity:1;
}

/* LOGO */
.card img{
  width:80px;
  height:55px;
  object-fit:contain;
}

/* STAR */
.star{
  position:absolute;
  top:8px;
  right:10px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<div class="search-box">
  <input id="searchInput" placeholder="Search products...">
  <select id="platformSelect"></select>
  <button onclick="search()">Go</button>
</div>

<div class="categories">
  <button onclick="setCategory('all',this)" class="active">All</button>
  <button onclick="setCategory('fashion',this)">Fashion</button>
  <button onclick="setCategory('electronics',this)">Electronics</button>
  <button onclick="setCategory('beauty',this)">Beauty</button>
</div>

<div id="grid" class="grid"></div>

<script>
const platforms={
  all:["Amazon","Flipkart","Myntra","Ajio","Tata Cliq","Nykaa"],
  fashion:["Myntra","Ajio","Tata Cliq"],
  electronics:["Amazon","Flipkart"],
  beauty:["Nykaa"]
};

const links={
  Amazon:"https://www.amazon.in/s?k=",
  Flipkart:"https://www.flipkart.com/search?q=",
  Myntra:"https://www.myntra.com/",
  Ajio:"https://www.ajio.com/search/?text=",
  "Tata Cliq":"https://www.tatacliq.com/search/?text=",
  Nykaa:"https://www.nykaa.com/search/result/?q="
};

const logos={
  Amazon:"amazon.png",
  Flipkart:"flipkart.png",
  Myntra:"myntra.png",
  Ajio:"ajio.png",
  "Tata Cliq":"tatacliq.png",
  Nykaa:"nykaa.png"
};

let favorites = JSON.parse(localStorage.getItem("favApps")) || [];

function toggleFav(name,e){
  e.stopPropagation();
  if(favorites.includes(name)){
    favorites = favorites.filter(f=>f!==name);
  }else{
    favorites.push(name);
  }
  localStorage.setItem("favApps",JSON.stringify(favorites));
  updateGrid("all");
}

function updateGrid(cat){
  const g=document.getElementById("grid");
  g.innerHTML="";
  platforms[cat].forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=logos[p];

    const star=document.createElement("div");
    star.className="star";
    star.innerText = favorites.includes(p) ? "⭐" : "☆";
    star.onclick=(e)=>toggleFav(p,e);

    card.appendChild(star);
    card.appendChild(img);

    card.onclick=()=>window.open(links[p],"_blank");

    g.appendChild(card);
  });
}

function updateDropdown(cat){
  const d=document.getElementById("platformSelect");
  d.innerHTML="";
  platforms[cat].forEach(p=>{
    const o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    d.appendChild(o);
  });
}

function setCategory(cat,btn){
  document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  updateDropdown(cat);
  updateGrid(cat);
}

function search(){
  const q=encodeURIComponent(document.getElementById("searchInput").value.trim());
  const p=document.getElementById("platformSelect").value;
  if(!q) return;
  window.open(links[p]+q,"_blank");
}

/* INIT */
updateDropdown("all");
updateGrid("all");

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
