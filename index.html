<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#06121f,#000814);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:#000;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box{
  display:flex;
  gap:8px;
  padding:12px;
}

.search-box input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box select{
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box button{
  padding:12px 16px;
  border-radius:25px;
  border:none;
  background:#4fd1ff;
  font-weight:bold;
}

/* CATEGORY */
.categories{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 16px;
  border-radius:20px;
  border:none;
  background:#1b2736;
  color:white;
}

.categories .active{
  background:#4fd1ff;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  height:110px;
  border-radius:18px;
  background:#1b2736;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.2s;
}

.card:active{
  transform:scale(0.95);
}

/* LOGO */
.card img{
  width:80px;
  height:50px;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<div class="search-box">
  <input id="searchInput" placeholder="Search products...">
  <select id="platformSelect"></select>
  <button onclick="search()">Go</button>
</div>

<div class="categories">
  <button onclick="setCategory('all',this)">All</button>
  <button onclick="setCategory('fashion',this)">Fashion</button>
  <button onclick="setCategory('electronics',this)">Electronics</button>
  <button onclick="setCategory('beauty',this)">Beauty</button>
</div>

<div class="grid" id="grid"></div>

<script>
const platforms={
  all:["Amazon","Flipkart","Myntra","Ajio","Tata Cliq","Nykaa"],
  fashion:["Myntra","Ajio","Tata Cliq"],
  electronics:["Amazon","Flipkart"],
  beauty:["Nykaa"]
};

const links={
  Amazon:"https://www.amazon.in/s?k=",
  Flipkart:"https://www.flipkart.com/search?q=",
  Myntra:"https://www.myntra.com/",
  Ajio:"https://www.ajio.com/",
  "Tata Cliq":"https://www.tatacliq.com/",
  Nykaa:"https://www.nykaa.com/"
};

/* LOGO PATHS */
const logos={
  Amazon:"amazon.png",
  Flipkart:"flipkart.png",
  Myntra:"myntra.png",
  Ajio:"ajio.png",
  "Tata Cliq":"tatacliq.png",
  Nykaa:"nykaa.png"
};

/* UPDATE DROPDOWN */
function updateDropdown(cat){
  const d=document.getElementById("platformSelect");
  d.innerHTML="";
  platforms[cat].forEach(p=>{
    const o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    d.appendChild(o);
  });
}

/* UPDATE GRID */
function updateGrid(cat){
  const g=document.getElementById("grid");
  g.innerHTML="";

  platforms[cat].forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=logos[p];

    /* fallback if logo missing */
    img.onerror=()=>{
      img.remove();
      card.innerText=p;
    };

    card.appendChild(img);

    card.onclick=()=>{
      window.open(links[p],"_blank");
    };

    g.appendChild(card);
  });
}

/* CATEGORY SELECT */
function setCategory(cat,btn){
  document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  updateDropdown(cat);
  updateGrid(cat);
}

/* SEARCH */
function search(){
  const q=document.getElementById("searchInput").value;
  const p=document.getElementById("platformSelect").value;

  if(!q) return;

  if(p==="Amazon"||p==="Flipkart"){
    window.open(links[p]+q,"_blank");
  }else{
    window.open(links[p],"_blank");
  }
}

/* INIT */
updateDropdown("all");
updateGrid("all");
</script>

</body>
</html>
