<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4fd1ff">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(#06121f,#000814);
}

.header{
  padding:15px;
  text-align:center;
  background:#000;
}

.search-box{
  display:flex;
  gap:6px;
  padding:10px;
}

input, select, button{
  padding:10px;
  border-radius:20px;
  border:none;
}

input{flex:1;}

.categories{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.categories button{
  background:#1b2736;
  color:white;
}

.categories .active{
  background:#4fd1ff;
  color:black;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  height:100px;
  background:#1b2736;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.card img{
  max-width:70px;
}

.fav{
  position:absolute;
  top:5px;
  right:8px;
}

#installBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px;
  background:#4fd1ff;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <h2>🛒 Shopping Hub</h2>
</div>

<div class="search-box">
  <input id="searchInput" placeholder="Search...">
  <select id="platformSelect"></select>
  <button onclick="search()">Go</button>
</div>

<div class="categories">
  <button onclick="setCat('all',this)">All</button>
  <button onclick="setCat('fashion',this)">Fashion</button>
  <button onclick="setCat('electronics',this)">Electronics</button>
  <button onclick="setCat('beauty',this)">Beauty</button>
</div>

<div class="grid" id="grid"></div>

<button id="installBtn">Install</button>

<script>
const platforms={
  all:["Amazon","Flipkart","Myntra","Ajio","Tata Cliq","Nykaa"],
  fashion:["Myntra","Ajio","Tata Cliq"],
  electronics:["Amazon","Flipkart"],
  beauty:["Nykaa"]
};

const links={
  Amazon:"https://www.amazon.in/s?k=",
  Flipkart:"https://www.flipkart.com/search?q=",
  Myntra:"https://www.myntra.com/",
  Ajio:"https://www.ajio.com/",
  "Tata Cliq":"https://www.tatacliq.com/",
  Nykaa:"https://www.nykaa.com/"
};

const logos={
  Amazon:"amazon.png",
  Flipkart:"flipkart.png",
  Myntra:"myntra.png",
  Ajio:"ajio.png",
  "Tata Cliq":"tatacliq.png",
  Nykaa:"nykaa.png"
};

function updateDropdown(cat){
  let d=document.getElementById("platformSelect");
  d.innerHTML="";
  platforms[cat].forEach(p=>{
    let o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    d.appendChild(o);
  });
}

function updateGrid(cat){
  let g=document.getElementById("grid");
  g.innerHTML="";

  platforms[cat].forEach(p=>{
    let card=document.createElement("div");
    card.className="card";

    let img=document.createElement("img");
    img.src=logos[p];

    img.onerror=()=>{
      img.remove();
      card.innerText=p;
    };

    let fav=document.createElement("div");
    fav.className="fav";
    fav.innerText="⭐";

    fav.onclick=(e)=>{
      e.stopPropagation();
      let f=JSON.parse(localStorage.getItem("fav"))||[];
      if(!f.includes(p)) f.push(p);
      localStorage.setItem("fav",JSON.stringify(f));
    };

    card.appendChild(img);
    card.appendChild(fav);

    card.onclick=()=>window.open(links[p],"_blank");

    g.appendChild(card);
  });
}

function setCat(cat,btn){
  localStorage.setItem("cat",cat);
  document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  updateDropdown(cat);
  updateGrid(cat);
}

function search(){
  let q=document.getElementById("searchInput").value;
  let p=document.getElementById("platformSelect").value;

  if(!q) return;

  if(p==="Amazon"||p==="Flipkart"){
    window.open(links[p]+q,"_blank");
  }else{
    window.open(links[p],"_blank");
  }
}

/* INIT */
let last=localStorage.getItem("cat")||"all";
updateDropdown(last);
updateGrid(last);

/* INSTALL */
let deferred;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferred=e;
  installBtn.style.display="block";
});

installBtn.onclick=()=>{
  deferred.prompt();
};

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
