<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#000, #001f3f);
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
}

.search-bar {
  display: flex;
  gap: 10px;
  padding: 10px;
}

input, select {
  padding: 12px;
  border-radius: 25px;
  border: none;
  width: 100%;
}

button {
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: #4cc9f0;
  font-weight: bold;
}

.trending {
  padding: 10px;
  font-size: 14px;
}

.trending span {
  margin-right: 10px;
  cursor: pointer;
  color: #4cc9f0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1e2a38;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  position: relative;
}

.card img {
  width: 80px;
}

.star {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;
}

.section-title {
  padding: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<div class="search-bar">
  <input id="search" placeholder="Search products...">
  <select id="platform">
    <option value="amazon">Amazon</option>
    <option value="flipkart">Flipkart</option>
    <option value="myntra">Myntra</option>
    <option value="ajio">Ajio</option>
    <option value="tatacliq">TataCliq</option>
    <option value="nykaa">Nykaa</option>
  </select>
  <button onclick="search()">Go</button>
</div>

<div class="trending">
🔥 Trending:
<span onclick="quick('shoes')">Shoes</span>
<span onclick="quick('mobiles')">Mobiles</span>
<span onclick="quick('watches')">Watches</span>
<span onclick="quick('headphones')">Headphones</span>
</div>

<button onclick="searchAll()" style="margin:10px">🔍 Search in all apps</button>

<div class="section-title">⭐ Favorites</div>
<div id="fav" class="grid"></div>

<div class="section-title">🕒 Recently Visited</div>
<div id="recent" class="grid"></div>

<div class="section-title">🛍 All Apps</div>
<div id="apps" class="grid"></div>

<script>
const apps = {
  amazon: "https://www.amazon.in/s?k=",
  flipkart: "https://www.flipkart.com/search?q=",
  myntra: "https://www.myntra.com/",
  ajio: "https://www.ajio.com/search/?text=",
  tatacliq: "https://www.tatacliq.com/search/?searchCategory=all&text=",
  nykaa: "https://www.nykaa.com/search/result/?q="
};

const affiliate = {
  amazon: "&tag=yourid"
};

let fav = JSON.parse(localStorage.getItem("fav")) || [];
let recent = JSON.parse(localStorage.getItem("recent")) || [];

function search() {
  let q = document.getElementById("search").value;
  let p = document.getElementById("platform").value;
  let url = apps[p] + q + (affiliate[p] || "");
  addRecent(p);
  window.open(url);
}

function searchAll() {
  let q = document.getElementById("search").value;
  for (let key in apps) {
    window.open(apps[key] + q);
  }
}

function quick(q) {
  document.getElementById("search").value = q;
}

function toggleFav(app) {
  if (fav.includes(app)) {
    fav = fav.filter(a => a !== app);
  } else {
    fav.push(app);
  }
  localStorage.setItem("fav", JSON.stringify(fav));
  render();
}

function addRecent(app) {
  recent = [app, ...recent.filter(a => a !== app)].slice(0,5);
  localStorage.setItem("recent", JSON.stringify(recent));
  render();
}

function createCard(app) {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="star" onclick="toggleFav('${app}')">
      ${fav.includes(app) ? "⭐" : "☆"}
    </div>
    <img src="${app}.png">
    <p>${app}</p>
  `;

  div.onclick = () => {
    addRecent(app);
    window.open(apps[app]);
  };

  return div;
}

function render() {
  document.getElementById("apps").innerHTML = "";
  document.getElementById("fav").innerHTML = "";
  document.getElementById("recent").innerHTML = "";

  for (let app in apps) {
    document.getElementById("apps").appendChild(createCard(app));
  }

  fav.forEach(a => {
    document.getElementById("fav").appendChild(createCard(a));
  });

  recent.forEach(a => {
    document.getElementById("recent").appendChild(createCard(a));
  });
}

render();
</script>

</body>
</html>
