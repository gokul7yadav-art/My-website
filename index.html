<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg1: #000;
  --bg2: #001f3f;
  --card: #1e2a38;
  --accent: #4cc9f0;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: linear-gradient(to bottom, var(--bg1), var(--bg2));
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 16px;
  font-size: 22px;
  font-weight: 600;
}

/* PAGE */
.page {
  min-height: 100vh;
  padding-bottom: 90px;
  display: none;
}

#home { display: block; }

/* SEARCH */
.search-bar {
  display: flex;
  gap: 10px;
  padding: 10px;
}

input, select {
  padding: 12px;
  border-radius: 25px;
  border: none;
  width: 100%;
}

button {
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: var(--accent);
  font-weight: bold;
}

/* TRENDING */
.trending {
  padding: 10px;
  font-size: 14px;
}

.trending span {
  margin-right: 10px;
  color: var(--accent);
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  position: relative;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.95);
}

.card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.star {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 18px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  z-index: 1000;
}

.nav-item {
  color: gray;
  text-align: center;
  cursor: pointer;
}

.nav-item.active {
  color: var(--accent);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 10px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<!-- HOME -->
<div id="home" class="page">
<div class="search-bar">
  <input id="search" placeholder="Search products...">
  <select id="platform">
    <option value="amazon">Amazon</option>
    <option value="flipkart">Flipkart</option>
    <option value="myntra">Myntra</option>
    <option value="ajio">Ajio</option>
    <option value="tatacliq">TataCliq</option>
    <option value="nykaa">Nykaa</option>
  </select>
  <button onclick="search()">Go</button>
</div>

<div class="trending">
🔥 Trending:
<span onclick="quick('shoes')">Shoes</span>
<span onclick="quick('mobiles')">Mobiles</span>
<span onclick="quick('watches')">Watches</span>
</div>

<div id="apps" class="grid"></div>
</div>

<!-- FAVORITES -->
<div id="favPage" class="page">
<h2 style="padding:10px">⭐ Favorites</h2>
<div id="fav" class="grid"></div>
</div>

<!-- RECENT -->
<div id="recentPage" class="page">
<h2 style="padding:10px">🕒 Recently Visited</h2>
<div id="recent" class="grid"></div>
</div>

<!-- NAV -->
<div class="navbar">
  <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</div>
  <div class="nav-item" onclick="showPage('favPage', this)">⭐<br>Fav</div>
  <div class="nav-item" onclick="showPage('recentPage', this)">🕒<br>Recent</div>
</div>

<div id="toast" class="toast"></div>

<script>
/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

/* DATA */
const APPS = {
  amazon: "https://www.amazon.in/s?k=",
  flipkart: "https://www.flipkart.com/search?q=",
  myntra: "https://www.myntra.com/",
  ajio: "https://www.ajio.com/search/?text=",
  tatacliq: "https://www.tatacliq.com/search/?text=",
  nykaa: "https://www.nykaa.com/search/result/?q="
};

let state = {
  fav: JSON.parse(localStorage.getItem("fav")) || [],
  recent: JSON.parse(localStorage.getItem("recent")) || []
};

/* UTIL */
function save() {
  localStorage.setItem("fav", JSON.stringify(state.fav));
  localStorage.setItem("recent", JSON.stringify(state.recent));
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

/* SEARCH */
function search() {
  const q = document.getElementById("search").value.trim();
  const p = document.getElementById("platform").value;
  if (!q) return;

  addRecent(p);
  window.open(APPS[p] + q, "_blank");
}

/* QUICK */
function quick(q) {
  document.getElementById("search").value = q;
}

/* FAVORITE */
function toggleFav(app, e) {
  e.stopPropagation();

  if (state.fav.includes(app)) {
    state.fav = state.fav.filter(a => a !== app);
    toast("Removed from favorites");
  } else {
    state.fav.push(app);
    toast("Added to favorites");
  }

  save();
  render();
}

/* RECENT */
function addRecent(app) {
  state.recent = [app, ...state.recent.filter(a => a !== app)].slice(0,5);
  save();
}

/* CARD */
function createCard(app) {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="star">${state.fav.includes(app) ? "⭐" : "☆"}</div>
    <img src="${app}.png" onerror="this.src='https://via.placeholder.com/70?text=${app}'">
    <p>${app.charAt(0).toUpperCase() + app.slice(1)}</p>
  `;

  div.onclick = () => {
    addRecent(app);
    window.open(APPS[app], "_blank");
    render();
  };

  div.querySelector(".star").onclick = (e) => toggleFav(app, e);

  return div;
}

/* RENDER */
function render() {
  const appsEl = document.getElementById("apps");
  const favEl = document.getElementById("fav");
  const recentEl = document.getElementById("recent");

  appsEl.innerHTML = "";
  favEl.innerHTML = "";
  recentEl.innerHTML = "";

  Object.keys(APPS).forEach(a => appsEl.appendChild(createCard(a)));
  state.fav.forEach(a => favEl.appendChild(createCard(a)));
  state.recent.forEach(a => recentEl.appendChild(createCard(a)));
}

/* NAV */
function showPage(id, el) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(id).style.display = "block";

  document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}

/* INIT */
render();
</script>

</body>
</html>
