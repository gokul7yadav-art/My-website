<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#06121f,#000814);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:#000;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box{
  display:flex;
  gap:8px;
  padding:12px;
}

.search-box input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box select{
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box button{
  padding:12px 16px;
  border-radius:25px;
  border:none;
  background:#4fd1ff;
  font-weight:bold;
}

/* CATEGORY */
.categories{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 16px;
  border-radius:20px;
  border:none;
  background:#1b2736;
  color:white;
}

.categories .active{
  background:#4fd1ff;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  height:110px;
  border-radius:18px;
  background:#1b2736;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.card:active{
  transform:scale(0.95);
}

/* LOGO */
.card img{
  width:80px;
  height:50px;
  object-fit:contain;
}

/* STAR */
.star{
  position:absolute;
  top:8px;
  right:10px;
  font-size:20px;
  cursor:pointer;
}

/* RESULTS */
#results{
  display:none;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<div class="search-box">
  <input id="searchInput" placeholder="Search products...">
  <select id="platformSelect"></select>
  <button onclick="search()">Go</button>
</div>

<div class="categories">
  <button onclick="setCategory('all',this)" class="active">All</button>
  <button onclick="setCategory('fashion',this)">Fashion</button>
  <button onclick="setCategory('electronics',this)">Electronics</button>
  <button onclick="setCategory('beauty',this)">Beauty</button>
</div>

<div id="grid" class="grid"></div>

<!-- RESULT SCREEN -->
<div id="results">
  <button onclick="goHome()">⬅ Back</button>
  <h2 id="resultTitle"></h2>
  <p id="resultDesc"></p>

  <button onclick="openSearch()" 
  style="margin-top:15px; padding:12px 20px; border-radius:20px; border:none; background:#4fd1ff; font-weight:bold;">
  Open Results 🚀
  </button>
</div>

<script>
const platforms={
  all:["Amazon","Flipkart","Myntra","Ajio","Tata Cliq","Nykaa"],
  fashion:["Myntra","Ajio","Tata Cliq"],
  electronics:["Amazon","Flipkart"],
  beauty:["Nykaa"]
};

const links={
  Amazon:"https://www.amazon.in/s?k=",
  Flipkart:"https://www.flipkart.com/search?q=",
  Myntra:"https://www.myntra.com/",
  Ajio:"https://www.ajio.com/search/?text=",
  "Tata Cliq":"https://www.tatacliq.com/search/?text=",
  Nykaa:"https://www.nykaa.com/search/result/?q="
};

const logos={
  Amazon:"amazon.png",
  Flipkart:"flipkart.png",
  Myntra:"myntra.png",
  Ajio:"ajio.png",
  "Tata Cliq":"tatacliq.png",
  Nykaa:"nykaa.png"
};

/* FAVORITES */
let favorites = JSON.parse(localStorage.getItem("favApps")) || [];

function toggleFav(name,star,e){
  e.stopPropagation();

  if(favorites.includes(name)){
    favorites = favorites.filter(f=>f!==name);
    star.innerText="☆";
  }else{
    favorites.push(name);
    star.innerText="⭐";
  }

  localStorage.setItem("favApps",JSON.stringify(favorites));
}

/* GRID */
function updateGrid(cat){
  const g=document.getElementById("grid");
  g.innerHTML="";

  platforms[cat].forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=logos[p];

    img.onerror=()=>{
      img.remove();
      card.innerText=p;
    };

    const star=document.createElement("div");
    star.className="star";
    star.innerText = favorites.includes(p) ? "⭐" : "☆";
    star.onclick=(e)=>toggleFav(p,star,e);

    card.appendChild(star);
    card.appendChild(img);

    card.onclick=()=>{
      window.open(links[p],"_blank");
    };

    g.appendChild(card);
  });
}

/* DROPDOWN */
function updateDropdown(cat){
  const d=document.getElementById("platformSelect");
  d.innerHTML="";
  platforms[cat].forEach(p=>{
    const o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    d.appendChild(o);
  });
}

/* CATEGORY */
function setCategory(cat,btn){
  document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  updateDropdown(cat);
  updateGrid(cat);
}

/* SEARCH */
let currentURL="";

function search(){
  const q=document.getElementById("searchInput").value.trim();
  const p=document.getElementById("platformSelect").value;

  if(!q) return;

  currentURL = links[p] + encodeURIComponent(q);

  document.getElementById("grid").style.display="none";
  document.getElementById("results").style.display="block";

  document.getElementById("resultTitle").innerText="Searching: " + q;
  document.getElementById("resultDesc").innerText="Platform: " + p;
}

/* OPEN */
function openSearch(){
  window.open(currentURL,"_blank");
}

/* BACK */
function goHome(){
  document.getElementById("grid").style.display="grid";
  document.getElementById("results").style.display="none";
}

/* INIT */
updateDropdown("all");
updateGrid("all");
</script>

</body>
</html>
