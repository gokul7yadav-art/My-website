<script>
let currentCategory = "all";

const platforms = {
  all: [
    {name:"Amazon", url:"https://www.amazon.in/s?k="},
    {name:"Flipkart", url:"https://www.flipkart.com/search?q="}
  ],
  electronics: [
    {name:"Amazon", url:"https://www.amazon.in/s?k="},
    {name:"Flipkart", url:"https://www.flipkart.com/search?q="}
  ],
  fashion: [
    {name:"Myntra", url:"https://www.myntra.com/"},
    {name:"Ajio", url:"https://www.ajio.com/search/?text="},
    {name:"Tata Cliq", url:"https://www.tatacliq.com/search/?searchCategory=all&text="}
  ],
  beauty: [
    {name:"Nykaa", url:"https://www.nykaa.com/search/result/?q="}
  ]
};

function updateDropdown(category) {
  const select = document.getElementById("platform");
  select.innerHTML = "";

  platforms[category].forEach(p => {
    let option = document.createElement("option");
    option.value = p.url;
    option.textContent = p.name;
    select.appendChild(option);
  });
}

function search() {
  let q = document.getElementById("searchInput").value;
  let base = document.getElementById("platform").value;

  if(q.trim() === "") return;

  window.open(base + q, "_blank");
}

function showCategory(category, el) {
  currentCategory = category;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  document.querySelectorAll('.card').forEach(card => {
    if(category === 'all' || card.classList.contains(category)) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });

  updateDropdown(category); // 🔥 THIS IS THE KEY
}

// initialize
updateDropdown("all");

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
