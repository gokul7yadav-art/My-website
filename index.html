<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<style>
:root{
  --accent:#4fd1ff;
  --bg1:#06121f;
  --bg2:#000814;
}

body{
  margin:0;
  font-family:'Segoe UI',system-ui,Arial,sans-serif;
  color:#e8f3ff;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}

/* HEADER */
.header{
  padding:16px;
  text-align:center;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}
.header h1{
  margin:0;
  color:var(--accent);
}

/* SEARCH */
.search-box{
  display:flex;
  gap:8px;
  padding:14px;
}
.search-box input{
  flex:1;
  min-width:0;
  padding:12px;
  border-radius:999px;
  border:none;
  outline:none;
}
.search-box select{
  padding:12px;
  border-radius:999px;
  border:none;
  max-width:110px;
}
.search-box button{
  padding:12px 14px;
  border-radius:999px;
  border:none;
  background:var(--accent);
  font-weight:700;
}

/* CATEGORY */
.categories{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:6px 10px;
}
.categories button{
  padding:8px 14px;
  border-radius:999px;
  border:none;
  background:#1b2736;
  color:#cfe6ff;
}
.categories button.active{
  background:var(--accent);
  color:#001018;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  padding:16px;
}

/* CARD */
.card{
  position:relative;
  height:110px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transition:.2s;
}
.card:active{
  transform:scale(.95);
}
.card:hover{
  background:rgba(79,209,255,.18);
}

/* LOGO */
.card img{
  max-width:90px;
  max-height:45px;
  object-fit:contain;
}

/* RIPPLE */
.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.4);
  transform:scale(0);
  animation:ripple .5s linear;
}
@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>🛒 Shopping Hub</h1>
</div>

<div class="search-box">
  <input id="searchInput" placeholder="Search products...">
  <select id="platformSelect"></select>
  <button onclick="searchProduct()">Go</button>
</div>

<div class="categories">
  <button class="active" onclick="setCategory('all', this)">All</button>
  <button onclick="setCategory('fashion', this)">Fashion</button>
  <button onclick="setCategory('electronics', this)">Electronics</button>
  <button onclick="setCategory('beauty', this)">Beauty</button>
</div>

<div class="grid" id="storeGrid"></div>

<script>
const platforms = {
  all:["Amazon","Flipkart","Myntra","Ajio","Tata Cliq","Nykaa"],
  fashion:["Myntra","Ajio","Tata Cliq"],
  electronics:["Amazon","Flipkart"],
  beauty:["Nykaa"]
};

const links = {
  Amazon:"https://www.amazon.in/s?k=",
  Flipkart:"https://www.flipkart.com/search?q=",
  Myntra:"https://www.myntra.com/",
  Ajio:"https://www.ajio.com/",
  "Tata Cliq":"https://www.tatacliq.com/",
  Nykaa:"https://www.nykaa.com/"
};

/* ✅ STABLE LOGOS */
const logos = {
  Amazon:"https://logo.clearbit.com/amazon.in",
  Flipkart:"https://logo.clearbit.com/flipkart.com",
  Myntra:"https://logo.clearbit.com/myntra.com",
  Ajio:"https://logo.clearbit.com/ajio.com",
  "Tata Cliq":"https://logo.clearbit.com/tatacliq.com",
  Nykaa:"https://logo.clearbit.com/nykaa.com"
};

function updateDropdown(category){
  const d=document.getElementById("platformSelect");
  d.innerHTML="";
  platforms[category].forEach(p=>{
    let o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    d.appendChild(o);
  });
}

function updateGrid(category){
  const grid=document.getElementById("storeGrid");
  grid.innerHTML="";

  platforms[category].forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=logos[p];
    img.alt=p;

    /* fallback if image fails */
    img.onerror=()=>{
      img.remove();
      const text=document.createElement("span");
      text.textContent=p;
      text.style.fontWeight="600";
      card.appendChild(text);
    };

    card.appendChild(img);

    card.onclick=(e)=>{
      const ripple=document.createElement("span");
      ripple.className="ripple";
      ripple.style.left=e.offsetX+"px";
      ripple.style.top=e.offsetY+"px";
      card.appendChild(ripple);
      setTimeout(()=>ripple.remove(),500);

      window.open(links[p],"_blank");
    };

    grid.appendChild(card);
  });
}

function setCategory(category,btn){
  document.querySelectorAll(".categories button")
    .forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  updateDropdown(category);
  updateGrid(category);
}

function searchProduct(){
  const q=document.getElementById("searchInput").value.trim();
  const p=document.getElementById("platformSelect").value;
  if(!q) return;

  if(p==="Amazon"||p==="Flipkart"){
    window.open(links[p]+encodeURIComponent(q),"_blank");
  }else{
    window.open(links[p],"_blank");
  }
}

/* INIT */
updateDropdown("all");
updateGrid("all");
</script>

</body>
</html>
