<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to bottom,#000,#001f3f);
  color:white;
}

.header {
  text-align:center;
  padding:15px;
  font-size:22px;
}

/* PAGES */
.page { display:none; padding-bottom:90px; }
#home { display:block; }

/* SEARCH */
.search-bar {
  display:flex;
  gap:10px;
  padding:10px;
}
input, select {
  padding:10px;
  border-radius:20px;
  border:none;
  width:100%;
}
button {
  padding:10px;
  border-radius:20px;
  border:none;
  background:#4cc9f0;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1e2a38;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:120px;
  object-fit:contain;
}

/* NAV */
.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav-item { color:gray; }
.nav-item.active { color:#4cc9f0; }

.price {
  color:#4cc9f0;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<!-- HOME -->
<div id="home" class="page">
  <div class="search-bar">
    <input id="search" placeholder="Search products">
    <button onclick="searchProducts()">Search</button>
  </div>

  <div id="results" class="grid"></div>
</div>

<!-- COMPARE -->
<div id="compare" class="page">
  <h3 style="padding:10px">💰 Price Comparison</h3>
  <div id="compareList" class="grid"></div>
</div>

<!-- FAVORITES -->
<div id="favPage" class="page">
  <h3 style="padding:10px">⭐ Favorites</h3>
  <div id="fav" class="grid"></div>
</div>

<!-- RECENT -->
<div id="recentPage" class="page">
  <h3 style="padding:10px">🕒 Recent</h3>
  <div id="recent" class="grid"></div>
</div>

<!-- NAV -->
<div class="navbar">
  <div class="nav-item active" onclick="showPage('home',this)">🏠</div>
  <div class="nav-item" onclick="showPage('compare',this)">💰</div>
  <div class="nav-item" onclick="showPage('favPage',this)">⭐</div>
  <div class="nav-item" onclick="showPage('recentPage',this)">🕒</div>
</div>

<script>
let fav = JSON.parse(localStorage.getItem("fav")) || [];
let recent = JSON.parse(localStorage.getItem("recent")) || [];
let products = [];

/* SEARCH PRODUCTS */
async function searchProducts() {
  const q = document.getElementById("search").value;
  if (!q) return;

  const res = await fetch("https://dummyjson.com/products/search?q=" + q);
  const data = await res.json();

  products = data.products;

  renderProducts();
  renderCompare();
}

/* PRODUCT CARDS */
function renderProducts() {
  const container = document.getElementById("results");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="card" onclick="openProduct('${p.title}')">
        <img src="${p.thumbnail}">
        <p>${p.title}</p>
        <div class="price">₹${p.price}</div>
      </div>
    `;
  });
}

/* COMPARE VIEW */
function renderCompare() {
  const c = document.getElementById("compareList");
  c.innerHTML = "";

  products.forEach(p => {
    c.innerHTML += `
      <div class="card">
        <img src="${p.thumbnail}">
        <p>${p.title}</p>

        <div class="price">Amazon: ₹${p.price}</div>
        <div class="price">Flipkart: ₹${p.price + 100}</div>
        <div class="price">Myntra: ₹${p.price + 200}</div>
      </div>
    `;
  });
}

/* OPEN PRODUCT */
function openProduct(name) {
  window.open("https://www.google.com/search?q=" + name, "_blank");

  recent.unshift(name);
  localStorage.setItem("recent", JSON.stringify(recent.slice(0,5)));
}

/* NAVIGATION */
function showPage(id, el) {
  document.querySelectorAll(".page").forEach(p => p.style.display="none");
  document.getElementById(id).style.display="block";

  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  el.classList.add("active");
}
</script>

</body>
</html>
