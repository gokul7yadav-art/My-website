<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #06121f, #000814);
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.header h1 {
  margin: 0;
  color: #4fd1ff;
}

/* SEARCH FIXED */
.search-box {
  display: flex;
  gap: 8px;
  padding: 15px;
}

.search-box input {
  flex: 1;
  min-width: 0;
  padding: 12px;
  border-radius: 25px;
  border: none;
}

.search-box select {
  padding: 12px;
  border-radius: 25px;
  border: none;
  max-width: 110px;
}

.search-box button {
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #4fd1ff;
  font-weight: bold;
  white-space: nowrap;
}

/* CATEGORY */
.categories {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

.categories button {
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  background: #1f2a38;
  color: white;
}

.categories button.active {
  background: #4fd1ff;
  color: black;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

/* CARDS */
.card {
  padding: 25px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(79,209,255,0.2);
}

/* MOBILE FIX */
@media (max-width: 480px) {
  .search-box {
    flex-wrap: nowrap;
  }

  .search-box select {
    max-width: 90px;
  }

  .search-box button {
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>🛒 Shopping Hub</h1>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search products...">
  <select id="platformSelect"></select>
  <button onclick="searchProduct()">Go</button>
</div>

<div class="categories">
  <button class="active" onclick="setCategory('all', this)">All</button>
  <button onclick="setCategory('fashion', this)">Fashion</button>
  <button onclick="setCategory('electronics', this)">Electronics</button>
  <button onclick="setCategory('beauty', this)">Beauty</button>
</div>

<div class="grid" id="storeGrid"></div>

<script>
const platforms = {
  all: ["Amazon", "Flipkart", "Myntra", "Ajio", "Tata Cliq", "Nykaa"],
  fashion: ["Myntra", "Ajio", "Tata Cliq"],
  electronics: ["Amazon", "Flipkart"],
  beauty: ["Nykaa"]
};

const links = {
  Amazon: "https://www.amazon.in/s?k=",
  Flipkart: "https://www.flipkart.com/search?q=",
  Myntra: "https://www.myntra.com/",
  Ajio: "https://www.ajio.com/",
  "Tata Cliq": "https://www.tatacliq.com/",
  Nykaa: "https://www.nykaa.com/"
};

function updateDropdown(category) {
  const dropdown = document.getElementById("platformSelect");
  dropdown.innerHTML = "";

  platforms[category].forEach(p => {
    let option = document.createElement("option");
    option.value = p;
    option.textContent = p;
    dropdown.appendChild(option);
  });
}

function updateGrid(category) {
  const grid = document.getElementById("storeGrid");
  grid.innerHTML = "";

  platforms[category].forEach(p => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = p;
    div.onclick = () => window.open(links[p], "_blank");
    grid.appendChild(div);
  });
}

function setCategory(category, btn) {
  document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updateDropdown(category);
  updateGrid(category);
}

function searchProduct() {
  const query = document.getElementById("searchInput").value;
  const platform = document.getElementById("platformSelect").value;

  if (!query) return;

  let url = links[platform];

  if (platform === "Amazon" || platform === "Flipkart") {
    window.open(url + encodeURIComponent(query), "_blank");
  } else {
    window.open(url, "_blank");
  }
}

/* INIT */
updateDropdown("all");
updateGrid("all");
</script>

</body>
</html>
