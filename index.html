<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#000814;
  color:white;
}

/* HEADER */
.header{
  padding:16px;
  font-size:22px;
  font-weight:700;
  text-align:center;
  background:#000;
}

/* SCREENS */
.screen{
  display:none;
  padding-bottom:70px;
}

.active{
  display:block;
}

/* SEARCH */
.search-box{
  display:flex;
  gap:8px;
  padding:12px;
}

.search-box input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box select{
  padding:12px;
  border-radius:25px;
  border:none;
}

.search-box button{
  padding:12px;
  border-radius:25px;
  border:none;
  background:#4fd1ff;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.categories button{
  padding:10px 16px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
}

.categories .active-btn{
  background:#4fd1ff;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  height:120px;
  border-radius:18px;
  background:#1e293b;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.card img{
  width:80px;
}

.card:active{
  transform:scale(0.95);
}

/* STAR */
.star{
  position:absolute;
  top:8px;
  right:10px;
  font-size:18px;
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #222;
}

.nav div{
  text-align:center;
  font-size:12px;
  cursor:pointer;
  opacity:0.7;
}

.nav .active-nav{
  color:#4fd1ff;
  opacity:1;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="search-box">
    <input id="searchInput" placeholder="Search products...">
    <select id="platformSelect"></select>
    <button onclick="search()">Go</button>
  </div>

  <div class="categories">
    <button onclick="setCategory('all',this)" class="active-btn">All</button>
    <button onclick="setCategory('fashion',this)">Fashion</button>
    <button onclick="setCategory('electronics',this)">Electronics</button>
    <button onclick="setCategory('beauty',this)">Beauty</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<!-- FAVORITES -->
<div id="favorites" class="screen">
  <h3 style="padding:10px;">⭐ Favorites</h3>
  <div id="favGrid" class="grid"></div>
</div>

<!-- SEARCH SCREEN -->
<div id="searchScreen" class="screen">
  <h3 style="padding:10px;">🔍 Search</h3>
  <p style="padding:10px;">Use search from home</p>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showScreen('home',this)" class="active-nav">🏠<br>Home</div>
  <div onclick="showScreen('favorites',this)">⭐<br>Fav</div>
  <div onclick="showScreen('searchScreen',this)">🔍<br>Search</div>
</div>

<script>
const platforms={
  all:["Amazon","Flipkart","Myntra","Ajio","Tata Cliq","Nykaa"],
  fashion:["Myntra","Ajio","Tata Cliq"],
  electronics:["Amazon","Flipkart"],
  beauty:["Nykaa"]
};

const links={
  Amazon:"https://www.amazon.in/s?k=",
  Flipkart:"https://www.flipkart.com/search?q=",
  Myntra:"https://www.myntra.com/",
  Ajio:"https://www.ajio.com/search/?text=",
  "Tata Cliq":"https://www.tatacliq.com/search/?text=",
  Nykaa:"https://www.nykaa.com/search/result/?q="
};

const logos={
  Amazon:"amazon.png",
  Flipkart:"flipkart.png",
  Myntra:"myntra.png",
  Ajio:"ajio.png",
  "Tata Cliq":"tatacliq.png",
  Nykaa:"nykaa.png"
};

let favorites = JSON.parse(localStorage.getItem("favApps")) || [];

function toggleFav(name,e){
  e.stopPropagation();
  if(favorites.includes(name)){
    favorites = favorites.filter(f=>f!==name);
  }else{
    favorites.push(name);
  }
  localStorage.setItem("favApps",JSON.stringify(favorites));
  updateGrid("all");
  updateFav();
}

function updateGrid(cat){
  const g=document.getElementById("grid");
  g.innerHTML="";
  platforms[cat].forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=logos[p];

    const star=document.createElement("div");
    star.className="star";
    star.innerText = favorites.includes(p) ? "⭐" : "☆";
    star.onclick=(e)=>toggleFav(p,e);

    card.appendChild(star);
    card.appendChild(img);

    card.onclick=()=>window.open(links[p],"_blank");

    g.appendChild(card);
  });
}

function updateFav(){
  const g=document.getElementById("favGrid");
  g.innerHTML="";
  favorites.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=logos[p];

    card.appendChild(img);
    card.onclick=()=>window.open(links[p],"_blank");

    g.appendChild(card);
  });
}

function updateDropdown(cat){
  const d=document.getElementById("platformSelect");
  d.innerHTML="";
  platforms[cat].forEach(p=>{
    const o=document.createElement("option");
    o.value=p;
    o.textContent=p;
    d.appendChild(o);
  });
}

function setCategory(cat,btn){
  document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active-btn"));
  btn.classList.add("active-btn");
  updateDropdown(cat);
  updateGrid(cat);
}

function search(){
  const q=encodeURIComponent(document.getElementById("searchInput").value.trim());
  const p=document.getElementById("platformSelect").value;
  if(!q) return;
  window.open(links[p]+q,"_blank");
}

/* NAVIGATION */
function showScreen(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active-nav"));
  el.classList.add("active-nav");
}

/* INIT */
updateDropdown("all");
updateGrid("all");
updateFav();

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
