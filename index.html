<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Hub</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #000, #001f3f);
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
}

/* Pages */
.page {
  min-height: 100vh;
  padding-bottom: 90px; /* prevents navbar overlap */
  display: none;
}

#home {
  display: block;
}

/* Search */
.search-bar {
  display: flex;
  gap: 10px;
  padding: 10px;
}

input, select {
  padding: 12px;
  border-radius: 25px;
  border: none;
  width: 100%;
}

button {
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: #4cc9f0;
  font-weight: bold;
}

/* Trending */
.trending {
  padding: 10px;
}

.trending span {
  margin-right: 10px;
  color: #4cc9f0;
  cursor: pointer;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

/* Cards */
.card {
  background: #1e2a38;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.card:active {
  transform: scale(0.95);
}

.card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.star {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 18px;
}

/* Navbar */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  z-index: 1000;
}

.nav-item {
  text-align: center;
  color: gray;
  cursor: pointer;
}

.nav-item.active {
  color: #4cc9f0;
}
</style>
</head>

<body>

<div class="header">🛒 Shopping Hub</div>

<!-- HOME -->
<div id="home" class="page">

<div class="search-bar">
  <input id="search" placeholder="Search products...">
  <select id="platform">
    <option value="amazon">Amazon</option>
    <option value="flipkart">Flipkart</option>
    <option value="myntra">Myntra</option>
    <option value="ajio">Ajio</option>
    <option value="tatacliq">TataCliq</option>
    <option value="nykaa">Nykaa</option>
  </select>
  <button onclick="search()">Go</button>
</div>

<div class="trending">
🔥 Trending:
<span onclick="quick('shoes')">Shoes</span>
<span onclick="quick('mobiles')">Mobiles</span>
<span onclick="quick('watches')">Watches</span>
<span onclick="quick('headphones')">Headphones</span>
</div>

<div id="apps" class="grid"></div>

</div>

<!-- FAVORITES -->
<div id="favPage" class="page">
<h2 style="padding:10px">⭐ Favorites</h2>
<div id="fav" class="grid"></div>
</div>

<!-- RECENT -->
<div id="recentPage" class="page">
<h2 style="padding:10px">🕒 Recently Visited</h2>
<div id="recent" class="grid"></div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</div>
  <div class="nav-item" onclick="showPage('favPage', this)">⭐<br>Fav</div>
  <div class="nav-item" onclick="showPage('recentPage', this)">🕒<br>Recent</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

const apps = {
  amazon: "https://www.amazon.in/s?k=",
  flipkart: "https://www.flipkart.com/search?q=",
  myntra: "https://www.myntra.com/",
  ajio: "https://www.ajio.com/search/?text=",
  tatacliq: "https://www.tatacliq.com/search/?text=",
  nykaa: "https://www.nykaa.com/search/result/?q="
};

let fav = JSON.parse(localStorage.getItem("fav")) || [];
let recent = JSON.parse(localStorage.getItem("recent")) || [];

function search() {
  let q = document.getElementById("search").value;
  let p = document.getElementById("platform").value;

  addRecent(p);
  window.open(apps[p] + q, "_blank");
}

function quick(q) {
  document.getElementById("search").value = q;
}

function toggleFav(app, e) {
  e.stopPropagation();

  if (fav.includes(app)) {
    fav = fav.filter(a => a !== app);
  } else {
    fav.push(app);
  }

  localStorage.setItem("fav", JSON.stringify(fav));
  render();
}

function addRecent(app) {
  recent = [app, ...recent.filter(a => a !== app)].slice(0,5);
  localStorage.setItem("recent", JSON.stringify(recent));
}

function createCard(app) {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="star">${fav.includes(app) ? "⭐" : "☆"}</div>
    <img src="${app}.png" onerror="this.src='https://via.placeholder.com/70?text=${app}'">
    <p>${app.charAt(0).toUpperCase() + app.slice(1)}</p>
  `;

  div.onclick = () => {
    addRecent(app);
    window.open(apps[app], "_blank");
    render();
  };

  div.querySelector(".star").onclick = (e) => toggleFav(app, e);

  return div;
}

function render() {
  document.getElementById("apps").innerHTML = "";
  document.getElementById("fav").innerHTML = "";
  document.getElementById("recent").innerHTML = "";

  for (let app in apps) {
    document.getElementById("apps").appendChild(createCard(app));
  }

  fav.forEach(a => document.getElementById("fav").appendChild(createCard(a)));
  recent.forEach(a => document.getElementById("recent").appendChild(createCard(a)));
}

function showPage(page, el) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(page).style.display = "block";

  document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}

render();
</script>

</body>
</html>
